<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeMeter Architecture</title>
<style>
  :root {
    --text-primary: #e8eaed;
    --text-muted: #565b66;
    --border: #2a2d34;
    --border-strong: #33373f;
    --surface-2: #1c1e22;
    --bg: #0e0f11;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, sans-serif;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:24px;
  }
  .container { width:100%; max-width:760px; }
  h1 { font-size:20px; font-weight:600; margin-bottom:4px; text-align:center; letter-spacing:-0.02em; }
  .sub { font-size:13px; color:var(--text-muted); text-align:center; margin-bottom:24px; }

  @keyframes tm-dash { to { stroke-dashoffset:-16; } }
  @keyframes tm-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes tm-glow { 0%,100%{opacity:.18} 50%{opacity:.55} }
  @keyframes tm-travel {
    0%   { opacity:0; transform: translateY(0); }
    12%  { opacity:1; }
    88%  { opacity:1; }
    100% { opacity:0; transform: translateY(var(--tm-dist, 30px)); }
  }
  @media (prefers-reduced-motion: no-preference) {
    .tm-flow { stroke-dasharray:6 6; animation:tm-dash 1.2s linear infinite; }
    .tm-loop { stroke-dasharray:5 7; animation:tm-dash 2s linear infinite; }
    .tm-dot  { animation:tm-pulse 1.8s ease-in-out infinite; }
    .tm-glow { animation:tm-glow 2.6s ease-in-out infinite; }
    .tm-bar  { animation:tm-travel 2.4s linear infinite; }
  }
</style>
</head>
<body>
  <div class="container">
    <h1>TradeMeter</h1>
    <div class="sub">Dual-timeframe ML trading system &middot; 19 models across 1-min &amp; 5-min</div>

    <svg viewBox="0 0 720 660" width="100%" role="img"
         aria-label="TradeMeter dual-timeframe architecture: two NinjaTrader charts (1-min and 5-min) tag each bar's timeframe, flow through Redis and a timeframe-routing FastAPI backend into two parallel pipelines — a 1-min context pipeline of 9 online models and a primary 5-min pipeline of 9 online models plus an LSTM — then persist per timeframe to TimescaleDB and MLflow and feed the 19-model dashboard.">
      <defs>
        <marker id="tm-arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="context-stroke" />
        </marker>
        <!-- Soft blur used for the glow-pulse behind key nodes -->
        <filter id="tm-soft" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="5" />
        </filter>
      </defs>

      <!-- ══════════════ DATA IN — two NinjaTrader charts ══════════════ -->

      <!-- 1-min chart (context — purple) -->
      <rect x="55" y="24" width="270" height="52" rx="11" fill="var(--surface-2)" stroke="#7F77DD" stroke-width="1.5" />
      <text x="190" y="46" text-anchor="middle" font-size="12.5" font-weight="600" fill="var(--text-primary)">NinjaTrader &middot; 1-min chart</text>
      <text x="190" y="63" text-anchor="middle" font-size="9.5" fill="var(--text-muted)">tags TIMEFRAME=1min</text>

      <!-- 5-min chart (primary — teal, glow) -->
      <rect class="tm-glow" x="395" y="24" width="270" height="52" rx="11" fill="none" stroke="#1D9E75" stroke-width="3" filter="url(#tm-soft)" />
      <rect x="395" y="24" width="270" height="52" rx="11" fill="var(--surface-2)" stroke="#1D9E75" stroke-width="2" />
      <text x="530" y="46" text-anchor="middle" font-size="12.5" font-weight="700" fill="var(--text-primary)">NinjaTrader &middot; 5-min chart</text>
      <text x="530" y="63" text-anchor="middle" font-size="9.5" fill="var(--text-muted)">tags TIMEFRAME=5min &middot; primary</text>

      <!-- Both charts -> Redis (converge) -->
      <line x1="190" y1="76" x2="300" y2="114" class="tm-flow" stroke="#7F77DD" stroke-width="2" marker-end="url(#tm-arrow)" />
      <line x1="530" y1="76" x2="420" y2="114" class="tm-flow" stroke="#1D9E75" stroke-width="2" marker-end="url(#tm-arrow)" />

      <!-- Redis Streams -->
      <rect x="210" y="116" width="300" height="54" rx="11" fill="var(--surface-2)" stroke="#5271ff" stroke-width="1.5" />
      <text x="360" y="138" text-anchor="middle" font-size="12.5" font-weight="600" fill="var(--text-primary)">TCP :5000 &rarr; Redis Streams</text>
      <text x="360" y="156" text-anchor="middle" font-size="9.5" fill="var(--text-muted)">arm gate &middot; consumer groups</text>

      <!-- Redis -> backend -->
      <line x1="360" y1="170" x2="360" y2="196" class="tm-flow" stroke="#5271ff" stroke-width="2" marker-end="url(#tm-arrow)" />
      <circle class="tm-bar" cx="360" cy="172" r="3" fill="#5271ff" style="--tm-dist:22px" />
      <circle class="tm-bar" cx="360" cy="172" r="3" fill="#5271ff" style="--tm-dist:22px;animation-delay:1.2s" />

      <!-- FastAPI backend -->
      <rect x="210" y="198" width="300" height="52" rx="11" fill="var(--surface-2)" stroke="#5271ff" stroke-width="1.5" />
      <text x="360" y="220" text-anchor="middle" font-size="12.5" font-weight="600" fill="var(--text-primary)">FastAPI backend</text>
      <text x="360" y="237" text-anchor="middle" font-size="9.5" fill="var(--text-muted)">routes by timeframe</text>

      <!-- Backend -> split into two pipelines -->
      <line x1="330" y1="250" x2="200" y2="286" class="tm-flow" stroke="#7F77DD" stroke-width="2" marker-end="url(#tm-arrow)" />
      <line x1="390" y1="250" x2="520" y2="286" class="tm-flow" stroke="#1D9E75" stroke-width="2" marker-end="url(#tm-arrow)" />

      <!-- ══════════════ LEFT — 1-min pipeline (context, purple) ══════════════ -->
      <rect x="40" y="288" width="300" height="182" rx="14" fill="var(--surface-2)" stroke="#7F77DD" stroke-width="1.2" />
      <text x="190" y="308" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.2" fill="#7F77DD">1-MIN PIPELINE &middot; CONTEXT</text>

      <rect x="60" y="316" width="260" height="40" rx="9" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="1" />
      <text x="190" y="334" text-anchor="middle" font-size="11" font-weight="600" fill="var(--text-primary)">Feature engine</text>
      <text x="190" y="348" text-anchor="middle" font-size="9" fill="var(--text-muted)">16 features per bar</text>
      <line x1="190" y1="356" x2="190" y2="364" class="tm-flow" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#tm-arrow)" />

      <rect x="60" y="366" width="260" height="40" rx="9" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="1" />
      <text x="190" y="384" text-anchor="middle" font-size="11" font-weight="600" fill="var(--text-primary)">9 online models</text>
      <text x="190" y="398" text-anchor="middle" font-size="9" fill="var(--text-muted)">River online-learners</text>
      <line x1="190" y1="406" x2="190" y2="414" class="tm-flow" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#tm-arrow)" />

      <rect x="60" y="416" width="260" height="42" rx="9" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="1" />
      <text x="190" y="435" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--text-primary)">predict &rarr; trade &rarr; learn</text>
      <text x="190" y="449" text-anchor="middle" font-size="9" fill="#7F77DD">&#8635; continuous loop</text>

      <!-- ══════════════ RIGHT — 5-min pipeline (primary, teal, glow) ══════════════ -->
      <rect class="tm-glow" x="380" y="288" width="300" height="182" rx="14" fill="none" stroke="#1D9E75" stroke-width="2.5" filter="url(#tm-soft)" />
      <rect x="380" y="288" width="300" height="182" rx="14" fill="var(--surface-2)" stroke="#1D9E75" stroke-width="2" />
      <text x="530" y="308" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="1.2" fill="#1D9E75">5-MIN PIPELINE &middot; PRIMARY</text>

      <rect x="400" y="316" width="260" height="40" rx="9" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="1" />
      <text x="530" y="334" text-anchor="middle" font-size="11" font-weight="600" fill="var(--text-primary)">Feature engine</text>
      <text x="530" y="348" text-anchor="middle" font-size="9" fill="var(--text-muted)">16 features per bar</text>
      <line x1="530" y1="356" x2="530" y2="364" class="tm-flow" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#tm-arrow)" />

      <rect x="400" y="366" width="260" height="40" rx="9" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="1" />
      <text x="530" y="384" text-anchor="middle" font-size="11" font-weight="600" fill="var(--text-primary)">9 online + LSTM = 10 models</text>
      <text x="530" y="398" text-anchor="middle" font-size="9" fill="var(--text-muted)">River online-learners &middot; Deep LSTM</text>
      <line x1="530" y1="406" x2="530" y2="414" class="tm-flow" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#tm-arrow)" />

      <rect x="400" y="416" width="260" height="42" rx="9" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="1" />
      <text x="530" y="435" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--text-primary)">predict &rarr; trade &rarr; learn</text>
      <text x="530" y="449" text-anchor="middle" font-size="9" fill="#1D9E75">&#8635; continuous loop</text>

      <!-- Both pipelines -> TimescaleDB + MLflow (converge) -->
      <line x1="190" y1="470" x2="300" y2="504" class="tm-flow" stroke="#7F77DD" stroke-width="2" marker-end="url(#tm-arrow)" />
      <line x1="530" y1="470" x2="420" y2="504" class="tm-flow" stroke="#1D9E75" stroke-width="2" marker-end="url(#tm-arrow)" />

      <!-- TimescaleDB + MLflow -->
      <rect x="210" y="506" width="300" height="54" rx="11" fill="var(--surface-2)" stroke="#5271ff" stroke-width="1.5" />
      <text x="360" y="528" text-anchor="middle" font-size="12.5" font-weight="600" fill="var(--text-primary)">TimescaleDB + MLflow</text>
      <text x="360" y="546" text-anchor="middle" font-size="9.5" fill="var(--text-muted)">bars &middot; weights &middot; levels &mdash; per timeframe</text>

      <!-- DB -> Dashboard -->
      <line x1="360" y1="560" x2="360" y2="586" class="tm-flow" stroke="#5271ff" stroke-width="2" marker-end="url(#tm-arrow)" />
      <circle class="tm-bar" cx="360" cy="562" r="3" fill="#5271ff" style="--tm-dist:22px" />
      <circle class="tm-bar" cx="360" cy="562" r="3" fill="#5271ff" style="--tm-dist:22px;animation-delay:1.2s" />

      <!-- React dashboard (output — glow) -->
      <rect class="tm-glow" x="210" y="588" width="300" height="54" rx="11" fill="none" stroke="#2dd4bf" stroke-width="3" filter="url(#tm-soft)" />
      <rect x="210" y="588" width="300" height="54" rx="11" fill="var(--surface-2)" stroke="#2dd4bf" stroke-width="1.5" />
      <text x="360" y="610" text-anchor="middle" font-size="12.5" font-weight="600" fill="var(--text-primary)">React dashboard &middot; WebSocket</text>
      <text x="360" y="628" text-anchor="middle" font-size="9.5" fill="var(--text-muted)">19 models &middot; combined leaderboard</text>
    </svg>
  </div>
</body>
</html>
