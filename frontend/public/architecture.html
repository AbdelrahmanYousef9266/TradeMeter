<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeMeter Architecture</title>
<style>
  :root {
    --text-primary: #e8eaed;
    --text-muted: #565b66;
    --border: #2a2d34;
    --border-strong: #33373f;
    --surface-2: #1c1e22;
    --bg: #0e0f11;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, sans-serif;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:24px;
  }
  .container { width:100%; max-width:720px; }
  h1 { font-size:20px; font-weight:600; margin-bottom:4px; text-align:center; letter-spacing:-0.02em; }
  .sub { font-size:13px; color:var(--text-muted); text-align:center; margin-bottom:24px; }

  @keyframes tm-dash { to { stroke-dashoffset:-16; } }
  @keyframes tm-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes tm-glow { 0%,100%{opacity:.18} 50%{opacity:.55} }
  @keyframes tm-travel {
    0%   { opacity:0; transform: translateY(0); }
    12%  { opacity:1; }
    88%  { opacity:1; }
    100% { opacity:0; transform: translateY(var(--tm-dist, 30px)); }
  }
  @media (prefers-reduced-motion: no-preference) {
    .tm-flow { stroke-dasharray:6 6; animation:tm-dash 1.2s linear infinite; }
    .tm-loop { stroke-dasharray:5 7; animation:tm-dash 2s linear infinite; }
    .tm-dot  { animation:tm-pulse 1.8s ease-in-out infinite; }
    .tm-glow { animation:tm-glow 2.6s ease-in-out infinite; }
    .tm-bar  { animation:tm-travel 2.4s linear infinite; }
  }
</style>
</head>
<body>
  <div class="container">
    <h1>TradeMeter</h1>
    <div class="sub">Live ML trading system &middot; data flow &amp; learning loop</div>

    <svg viewBox="0 0 680 700" width="100%" role="img"
         aria-label="TradeMeter architecture: live bars flow from NinjaTrader through Redis, TimescaleDB and the feature engine into 11 ML models that predict, trade, learn and feed the dashboard.">
      <defs>
        <marker id="tm-arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="context-stroke" />
        </marker>
      </defs>

      <!-- ══════════════ DATA FLOW ══════════════ -->

      <!-- NinjaTrader -->
      <rect x="220" y="24" width="240" height="52" rx="11" fill="var(--surface-2)" stroke="var(--border)" stroke-width="1" />
      <text x="340" y="46" text-anchor="middle" font-size="13" font-weight="600" fill="var(--text-primary)">NinjaTrader 8</text>
      <text x="340" y="63" text-anchor="middle" font-size="10" fill="var(--text-muted)">Live 1-min bars</text>

      <!-- NT -> Redis -->
      <line x1="340" y1="76" x2="340" y2="112" class="tm-flow" stroke="#5271ff" stroke-width="2" marker-end="url(#tm-arrow)" />
      <text x="352" y="98" font-size="9" fill="var(--text-muted)">TCP :5000</text>
      <circle class="tm-bar" cx="340" cy="78" r="3" fill="#5271ff" style="--tm-dist:32px" />
      <circle class="tm-bar" cx="340" cy="78" r="3" fill="#5271ff" style="--tm-dist:32px;animation-delay:1.2s" />

      <!-- Redis -->
      <rect x="220" y="112" width="240" height="52" rx="11" fill="var(--surface-2)" stroke="var(--border)" stroke-width="1" />
      <text x="340" y="134" text-anchor="middle" font-size="13" font-weight="600" fill="var(--text-primary)">Redis Streams</text>
      <text x="340" y="151" text-anchor="middle" font-size="10" fill="var(--text-muted)">Token auth &middot; crash-safe buffer</text>

      <!-- Redis -> TimescaleDB / Feature Engine (split) -->
      <line x1="330" y1="166" x2="200" y2="198" class="tm-flow" stroke="#5271ff" stroke-width="2" marker-end="url(#tm-arrow)" />
      <line x1="350" y1="166" x2="480" y2="198" class="tm-flow" stroke="#7F77DD" stroke-width="2" marker-end="url(#tm-arrow)" />

      <!-- TimescaleDB -->
      <rect x="70" y="200" width="250" height="56" rx="11" fill="var(--surface-2)" stroke="var(--border)" stroke-width="1" />
      <text x="195" y="224" text-anchor="middle" font-size="13" font-weight="600" fill="var(--text-primary)">TimescaleDB</text>
      <text x="195" y="241" text-anchor="middle" font-size="10" fill="var(--text-muted)">Stores every bar</text>

      <!-- Feature Engine -->
      <rect x="360" y="200" width="250" height="56" rx="11" fill="var(--surface-2)" stroke="var(--border)" stroke-width="1" />
      <text x="485" y="224" text-anchor="middle" font-size="13" font-weight="600" fill="var(--text-primary)">Feature Engine</text>
      <text x="485" y="241" text-anchor="middle" font-size="10" fill="var(--text-muted)">16 features per bar</text>

      <!-- -> Models (merge) -->
      <line x1="195" y1="256" x2="330" y2="290" class="tm-flow" stroke="#5271ff" stroke-width="2" marker-end="url(#tm-arrow)" />
      <line x1="485" y1="256" x2="350" y2="290" class="tm-flow" stroke="#7F77DD" stroke-width="2" marker-end="url(#tm-arrow)" />

      <!-- 11 ML models -->
      <rect x="60" y="292" width="560" height="104" rx="12" fill="var(--surface-2)" stroke="var(--border)" stroke-width="1" />
      <text x="340" y="312" text-anchor="middle" font-size="13" font-weight="600" fill="var(--text-primary)">11 ML Models — predict in parallel</text>
      <text x="340" y="327" text-anchor="middle" font-size="10" fill="var(--text-muted)">8 River online-learners &middot; You &middot; Brother &middot; Deep LSTM</text>

      <!-- Row 1 chips -->
      <rect x="86"  y="340" width="78" height="18" rx="5" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="0.75" />
      <text x="125" y="353" text-anchor="middle" font-size="9" fill="var(--text-primary)">Scalper</text>
      <rect x="172" y="340" width="78" height="18" rx="5" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="0.75" />
      <text x="211" y="353" text-anchor="middle" font-size="9" fill="var(--text-primary)">Momentum</text>
      <rect x="258" y="340" width="78" height="18" rx="5" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="0.75" />
      <text x="297" y="353" text-anchor="middle" font-size="9" fill="var(--text-primary)">Mean Rev</text>
      <rect x="344" y="340" width="78" height="18" rx="5" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="0.75" />
      <text x="383" y="353" text-anchor="middle" font-size="9" fill="var(--text-primary)">Breakout</text>
      <rect x="430" y="340" width="78" height="18" rx="5" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="0.75" />
      <text x="469" y="353" text-anchor="middle" font-size="9" fill="var(--text-primary)">Conserv.</text>
      <rect x="516" y="340" width="78" height="18" rx="5" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="0.75" />
      <text x="555" y="353" text-anchor="middle" font-size="9" fill="var(--text-primary)">Aggress.</text>

      <!-- Row 2 chips -->
      <rect x="129" y="364" width="78" height="18" rx="5" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="0.75" />
      <text x="168" y="377" text-anchor="middle" font-size="9" fill="var(--text-primary)">Volume</text>
      <rect x="215" y="364" width="78" height="18" rx="5" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="0.75" />
      <text x="254" y="377" text-anchor="middle" font-size="9" fill="var(--text-primary)">Contrar.</text>
      <rect x="301" y="364" width="78" height="18" rx="5" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="0.75" />
      <text x="340" y="377" text-anchor="middle" font-size="9" fill="var(--text-primary)">You</text>
      <rect x="387" y="364" width="78" height="18" rx="5" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="0.75" />
      <text x="426" y="377" text-anchor="middle" font-size="9" fill="var(--text-primary)">Brother</text>
      <rect x="473" y="364" width="78" height="18" rx="5" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="0.75" />
      <text x="512" y="377" text-anchor="middle" font-size="9" fill="var(--text-primary)">LSTM</text>

      <!-- Models -> Loop -->
      <line x1="340" y1="396" x2="340" y2="424" class="tm-flow" stroke="#5271ff" stroke-width="2" marker-end="url(#tm-arrow)" />
      <circle class="tm-bar" cx="340" cy="398" r="3" fill="#5271ff" style="--tm-dist:24px" />

      <!-- ══════════════ LEARNING LOOP ══════════════ -->

      <!-- Container + glow overlay -->
      <rect x="95" y="424" width="490" height="176" rx="14" fill="var(--surface-2)" stroke="var(--border)" stroke-width="1" />
      <rect class="tm-glow" x="95" y="424" width="490" height="176" rx="14" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="4 6" />
      <text x="340" y="444" text-anchor="middle" font-size="10" font-weight="600" letter-spacing="1.5" fill="#2dd4bf">LEARNING LOOP</text>

      <!-- Predict -->
      <rect x="135" y="452" width="170" height="48" rx="10" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="1" />
      <text x="220" y="472" text-anchor="middle" font-size="12" font-weight="600" fill="var(--text-primary)">Predict</text>
      <text x="220" y="488" text-anchor="middle" font-size="9" fill="var(--text-muted)">BUY &middot; SELL &middot; HOLD</text>

      <!-- Open trade -->
      <rect x="375" y="452" width="170" height="48" rx="10" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="1" />
      <text x="460" y="472" text-anchor="middle" font-size="12" font-weight="600" fill="var(--text-primary)">Open trade</text>
      <text x="460" y="488" text-anchor="middle" font-size="9" fill="var(--text-muted)">ATR stop &amp; target</text>

      <!-- Outcome -->
      <rect x="375" y="524" width="170" height="48" rx="10" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="1" />
      <text x="460" y="544" text-anchor="middle" font-size="12" font-weight="600" fill="var(--text-primary)">Outcome</text>
      <text x="460" y="560" text-anchor="middle" font-size="9" fill="var(--text-muted)">Real P&amp;L &middot; win / loss</text>

      <!-- Learn -->
      <rect x="135" y="524" width="170" height="48" rx="10" fill="var(--bg)" stroke="var(--border-strong)" stroke-width="1" />
      <text x="220" y="544" text-anchor="middle" font-size="12" font-weight="600" fill="var(--text-primary)">Learn</text>
      <text x="220" y="560" text-anchor="middle" font-size="9" fill="var(--text-muted)">.learn_one → weights</text>

      <!-- Loop arrows (clockwise) -->
      <line x1="307" y1="470" x2="373" y2="470" class="tm-loop" stroke="#2dd4bf" stroke-width="2" marker-end="url(#tm-arrow)" />
      <line x1="460" y1="502" x2="460" y2="522" class="tm-loop" stroke="#fbbf24" stroke-width="2" marker-end="url(#tm-arrow)" />
      <line x1="373" y1="554" x2="307" y2="554" class="tm-loop" stroke="#E24B4A" stroke-width="2" marker-end="url(#tm-arrow)" />
      <line x1="220" y1="522" x2="220" y2="502" class="tm-loop" stroke="#7F77DD" stroke-width="2" marker-end="url(#tm-arrow)" />
      <text x="150" y="514" font-size="9" fill="#7F77DD">↺ improve</text>

      <!-- Loop -> Dashboard -->
      <line x1="340" y1="600" x2="340" y2="628" class="tm-flow" stroke="#5271ff" stroke-width="2" marker-end="url(#tm-arrow)" />
      <circle class="tm-bar" cx="340" cy="602" r="3" fill="#5271ff" style="--tm-dist:24px" />

      <!-- Dashboard -->
      <rect x="200" y="628" width="280" height="54" rx="11" fill="var(--surface-2)" stroke="var(--border)" stroke-width="1" />
      <text x="340" y="651" text-anchor="middle" font-size="13" font-weight="600" fill="var(--text-primary)">Dashboard</text>
      <text x="340" y="668" text-anchor="middle" font-size="10" fill="var(--text-muted)">WebSocket &middot; signals &middot; P&amp;L &middot; levels</text>
    </svg>
  </div>
</body>
</html>
